<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Reflex Coach - Random interval timer for reflex training">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="rgba(212,255,0,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="timer-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4ff00"/>
      <stop offset="100%" stop-color="#a8cc00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Timer icon (left side) -->
  <g transform="translate(180, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#2a2a2a" stroke-width="20"/>
    <!-- Progress arc -->
    <path d="M0 -130 A130 130 0 1 1 -92 92" fill="none" stroke="url(#timer-glow)" stroke-width="24" stroke-linecap="round"/>
    <!-- Clock hand -->
    <line x1="0" y1="0" x2="60" y2="-70" stroke="#f5f5f5" stroke-width="16" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="14" fill="#f5f5f5"/>
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#d4ff00" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Brand text -->
  <g transform="translate(400, 260)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="500" letter-spacing="0.12em" fill="#6a6a6a">
      reflex<tspan fill="#d4ff00">:</tspan>coach
    </text>
  </g>

  <!-- Tagline -->
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" letter-spacing="0.04em" fill="#f5f5f5">
    Random Interval Timer
  </text>

  <!-- Description -->
  <text x="400" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.02em" fill="#6a6a6a">
    Train reflexes with unpredictable beeps, claps, whistles &amp; horns
  </text>

  <!-- Accent bar at bottom -->
  <rect x="0" y="610" width="1200" height="20" fill="#d4ff00"/>

  <!-- Sound wave elements (decorative) -->
  <g transform="translate(1050, 315)" opacity="0.15">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#d4ff00" stroke-width="3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#d4ff00" stroke-width="2"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#d4ff00" stroke-width="1"/>
  </g>
</svg>
